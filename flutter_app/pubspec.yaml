name: duochat
description: "DuoChat — Connect Instantly, Chat Seamlessly. Premium real-time messaging app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^2.31.0
  firebase_auth: ^4.19.5
  firebase_storage: ^11.7.5
  firebase_messaging: ^14.9.3

  # Realtime & networking
  socket_io_client: ^2.0.3+1
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Local persistence (chat cache / offline backup)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Media & calling
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  video_player: ^2.9.1
  record: ^5.1.0
  just_audio: ^0.9.38
  flutter_webrtc: ^0.10.6
  permission_handler: ^11.3.1

  # Contacts & QR
  contacts_service: ^0.6.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # UI / UX
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  animations: ^2.0.11
  glassmorphism: ^3.0.0
  timeago: ^3.7.0
  emoji_picker_flutter: ^2.2.0
  pin_code_fields: ^8.0.1
  flutter_local_notifications: ^17.1.2
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
